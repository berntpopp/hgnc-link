# Production overlay for hgnc-link (Container & Deployment Hardening Standard v1).
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Expose-only behind the reverse proxy: the base file's published host-port
# mapping is dropped with `ports: !reset []`. `!reset` (not a plain `[]`) is
# REQUIRED because Compose MERGES list fields across `-f` overlays, so `ports: []`
# would NOT drop the base "<host>:8000" mapping and the endpoint would stay
# published on the public IP. The container is reachable only via the proxy.
services:
  hgnc-link:
    environment:
      HGNC_LINK_LOG_LEVEL: INFO
      HGNC_LINK_LOG_FORMAT: json
      HGNC_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","hgnc-link.genefoundry.org"]'
    ports: !reset []
    expose:
      - "8000"
    # Rootfs, tmpfs, capability, process, and resource hardening are inherited
    # unchanged from the base file. Repeating unique list entries here makes
    # current Compose reject the merged configuration as duplicate.
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=hgnc-link,environment=production"
