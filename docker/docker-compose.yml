name: hgnc-link

services:
  hgnc-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: hgnc-link
    ports:
      - "${HGNC_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      HGNC_LINK_HOST: 0.0.0.0
      HGNC_LINK_PORT: 8000
      HGNC_LINK_TRANSPORT: unified
      HGNC_LINK_MCP_PATH: /mcp
      HGNC_LINK_LOG_LEVEL: INFO
      HGNC_LINK_LOG_FORMAT: json
      HGNC_LINK_DATA__DATA_DIR: /app/data
      HGNC_LINK_DATA__AUTO_BOOTSTRAP: "true"
      # Refresh is owned by cron (see docs/deployment.md). To refresh the running
      # container, run a host cron job:
      #   docker compose -f docker/docker-compose.yml exec hgnc-link hgnc-link-data refresh
      HGNC_LINK_DATA__REFRESH_ENABLED: "false"
    volumes:
      # Persist the built ~73MB SQLite index across container restarts.
      - hgnc-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hgnc-network

  # Optional: a one-shot refresh runner you can invoke from host cron, e.g.
  #   17 3 * * *  docker compose -f /path/docker/docker-compose.yml run --rm refresh
  refresh:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    entrypoint: ["hgnc-link-data", "refresh"]
    environment:
      HGNC_LINK_DATA__DATA_DIR: /app/data
    volumes:
      - hgnc-data:/app/data
    networks:
      - hgnc-network

volumes:
  hgnc-data:
    driver: local

networks:
  hgnc-network:
    driver: bridge
