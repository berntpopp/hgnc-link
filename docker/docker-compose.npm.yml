# Nginx Proxy Manager deployment overlay for hgnc-link.
#
# Self-contained (used standalone, not layered on docker-compose.yml): one
# unified container serves the FastAPI REST API on / and the MCP streamable-HTTP
# transport on /mcp via a single port (8000). NPM reverse-proxies to the fixed
# container_name on the shared external npm_default network. Mirrors the
# gtex-link / clingen-link / gencc-link fleet pattern.
#
#   docker compose -f docker/docker-compose.npm.yml --env-file .env.docker up -d --build
name: hgnc-link-npm

services:
  hgnc_link:
    # Deploy pulls the released, attested image; it never builds from source.
    # Pin a digest, not a tag: there is no `latest`, and only a digest is immutable.
    image: ${HGNC_LINK_IMAGE:?Set HGNC_LINK_IMAGE to ghcr.io/berntpopp/hgnc-link@sha256:<digest>}
    pull_policy: missing
    container_name: hgnc-link-npm
    # NO published host ports - NPM handles all routing via the container name.
    expose:
      - "8000"
    environment:
      - HGNC_LINK_HOST=0.0.0.0
      - HGNC_LINK_PORT=8000
      - HGNC_LINK_TRANSPORT=unified
      - HGNC_LINK_MCP_PATH=/mcp
      - 'HGNC_LINK_ALLOWED_HOSTS=["localhost","127.0.0.1","::1","hgnc-link.genefoundry.org"]'
      - HGNC_LINK_LOG_LEVEL=${LOG_LEVEL_API:-INFO}
      - HGNC_LINK_LOG_FORMAT=json
      - HGNC_LINK_DATA__DATA_DIR=/data
      - HGNC_LINK_DATA__AUTO_BOOTSTRAP=true
      # No cron sidecar in the NPM deploy, so let the in-app scheduler keep the
      # index fresh (conditional refresh; an unchanged source is a cheap no-op).
      - HGNC_LINK_DATA__REFRESH_ENABLED=true
      - HGNC_LINK_DATA__REFRESH_INTERVAL_HOURS=24
    # The image ENTRYPOINT builds the index then exec's the unified server,
    # reading HGNC_LINK_TRANSPORT/HOST/PORT above; no command override needed.
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot downloads (~33MB) + builds the ~73MB HGNC SQLite index.
      start_period: 150s
    restart: unless-stopped
    read_only: true
    tmpfs:
      # TMPDIR=/tmp (set in the image) - download/build scratch space.
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
    volumes:
      # Persist the built ~73MB SQLite index across container restarts.
      - hgnc-data:/data
    networks:
      - hgnc_link_internal_net
      - npm_proxy_network
    deploy:
      resources:
        limits:
          memory: ${HGNC_API_MEMORY_LIMIT:-1g}
          cpus: ${HGNC_API_CPU_LIMIT:-1.0}
          pids: 256
        reservations:
          memory: 256m
          cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=hgnc-link,environment=production,proxy=npm"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

volumes:
  hgnc-data:
    driver: local

networks:
  hgnc_link_internal_net:
    driver: bridge
    name: hgnc_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
